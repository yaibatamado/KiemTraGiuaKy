<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center mb-4">🧾 HÓA ĐƠN</h2>

<div class="card p-3 mb-3">
    <p><strong>Mã đơn:</strong> [[${order.id}]]</p>
    <p><strong>Tổng tiền:</strong> [[${order.total}]]</p>
</div>

<table class="table table-bordered text-center">
    <thead class="table-dark">
    <tr>
        <th>Tên sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Thành tiền</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="d : ${details}">
        <td th:text="${productRepo.findById(d.productId).get().name}"></td>
        <td th:text="${d.price}"></td>
        <td th:text="${d.quantity}"></td>
        <td th:text="${d.price * d.quantity}"></td>
    </tr>
    </tbody>
</table>

<div class="text-end">
    <h4>Tổng: [[${order.total}]]</h4>
</div>

<div class="mt-3">
    <a class="btn btn-primary" href="/">⬅ Quay về trang chủ</a>
</div>

</body>
</html>
