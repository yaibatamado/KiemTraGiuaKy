<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="text-center mb-4">🛒 GIỎ HÀNG</h2>

<table class="table table-bordered text-center">
    <thead class="table-dark">
    <tr>
        <th>Tên</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${cart}">
        <td th:text="${c.name}"></td>
        <td th:text="${c.price}"></td>
        <td th:text="${c.quantity}"></td>
        <td th:text="${c.total}"></td>
    </tr>
    </tbody>
</table>

<h4 class="text-end">Tổng tiền: <span th:text="${total}"></span></h4>

<div class="d-flex justify-content-between mt-3">
    <a class="btn btn-secondary" href="/">⬅ Quay lại</a>
    <a class="btn btn-success" href="/order/checkout">💳 Checkout</a>
</div>

</body>
</html>
