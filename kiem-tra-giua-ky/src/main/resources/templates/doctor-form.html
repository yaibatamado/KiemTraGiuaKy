<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Thêm / Sửa Bác Sĩ</h2>

<form th:action="@{/doctor/save}" th:object="${doctor}" method="post">

    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
        <label>Tên</label>
        <input type="text" th:field="*{name}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Chuyên khoa</label>
        <input type="text" th:field="*{specialty}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Hình</label>
        <input type="text" th:field="*{image}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Khoa</label>
        <select th:field="*{department}" class="form-control">
            <option th:each="d : ${departments}" 
                    th:value="${d.id}" 
                    th:text="${d.name}">
            </option>
        </select>
    </div>

    <button class="btn btn-success">Lưu</button>

</form>

</body>
</html>
