<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách bác sĩ</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👨‍⚕️ Danh sách bác sĩ</h2>

        <div>
            <!-- Hiển thị user -->
            <span class="me-3">
                👤 <b th:text="${session.user.username}"></b>
            </span>

            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>

    <!-- ADD BUTTON (CHỈ ADMIN) -->
    <div class="text-end mb-3"
         th:if="${session.user.role == 'ADMIN'}">
        <a href="/doctor/add" class="btn btn-primary">➕ Thêm bác sĩ</a>
    </div>

    <!-- LIST DOCTOR -->
    <div class="row">
        <div class="col-md-4 mb-4" th:each="d : ${doctors.content}">
            <div class="card shadow-sm h-100">

                <!-- IMAGE -->
                <img th:src="${d.image}" class="card-img-top"
                     style="height:200px; object-fit:cover;">

                <div class="card-body">

                    <!-- NAME -->
                    <h5 class="text-primary" th:text="${d.name}"></h5>

                    <!-- SPECIALTY -->
                    <p>
                        <b>Chuyên khoa:</b>
                        <span th:text="${d.specialty}"></span>
                    </p>

                    <!-- DEPARTMENT -->
                    <p>
                        <b>Khoa:</b>
                        <span th:text="${d.department != null ? d.department.name : 'Không có'}"></span>
                    </p>

                </div>

                <!-- CRUD BUTTON (CHỈ ADMIN) -->
                <div class="card-footer text-center"
                     th:if="${session.user.role == 'ADMIN'}">

                    <a th:href="@{/doctor/edit/{id}(id=${d.id})}"
                       class="btn btn-warning btn-sm">
                        ✏️ Sửa
                    </a>

                    <a th:href="@{/doctor/delete/{id}(id=${d.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa không?')">
                        ❌ Xóa
                    </a>

                </div>

            </div>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="text-center mt-4">

        <a class="btn btn-outline-primary"
           th:if="${doctors.hasPrevious()}"
           th:href="@{/home(page=${doctors.number - 1})}">
            ⬅ Prev
        </a>

        <span class="mx-3 fw-bold">
            Trang <span th:text="${doctors.number + 1}"></span>
        </span>

        <a class="btn btn-outline-primary"
           th:if="${doctors.hasNext()}"
           th:href="@{/home(page=${doctors.number + 1})}">
            Next ➡
        </a>

    </div>

</div>

</body>
</html>
